# Production config — use with: shopify app config use production && shopify app deploy

client_id = "5128d0a83c186a0970979939c562c58a"
name = "TE Configurator"
application_url = "https://te-configurator.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products,read_themes,write_themes"

[auth]
redirect_urls = [
  "https://te-configurator.vercel.app/auth/callback",
  "https://te-configurator.vercel.app/auth/shopify/callback",
  "https://te-configurator.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

[app_proxy]
url = "https://te-configurator.vercel.app/proxy"
subpath = "proto-configurator"
prefix = "apps"

[pos]
embedded = false
