name: Deploy Shopify

on:
  push:
    branches:
      - main
    paths:
      - "extensions/**"
      - "storefront/**"
      - "shopify.app*.toml"
      - "scripts/copy-storefront-assets.mjs"
      - "vite.storefront.config.ts"
      - ".github/workflows/deploy-shopify.yml"

jobs:
  deploy:
    name: Deploy extensions to Shopify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build storefront assets
        run: npm run build:storefront

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy to Shopify
        env:
          SHOPIFY_APP_AUTOMATION_TOKEN: ${{ secrets.SHOPIFY_APP_AUTOMATION_TOKEN }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: shopify app deploy --config production --allow-updates --source-control-url "$COMMIT_URL"
