name: Deploy Shopify

on:
  push:
    branches:
      - main
    paths:
      - "extensions/**"
      - "storefront/**"
      - "shopify.app*.toml"
      - "scripts/copy-storefront-assets.mjs"
      - "vite.storefront.config.ts"
      - ".github/workflows/deploy-shopify.yml"

jobs:
  deploy:
    name: Deploy extensions to Shopify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Rebuild ONLY the beta bundle from this commit. The stable bundle
      # (proto-configurator.{js,css} + proto-configurator-modal.js) is a committed, frozen artifact
      # — it is NOT rebuilt here, so merging changes to main updates only the Beta channel (which a
      # draft/test theme loads) and never the live theme, which is pinned to Stable. Promote a
      # validated beta to stable deliberately with `npm run promote:stable` (rebuilds + commits the
      # stable files); that commit then ships to Stable-channel themes on the next deploy.
      - name: Build storefront BETA assets
        run: npm run build:storefront:beta

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy to Shopify
        env:
          SHOPIFY_APP_AUTOMATION_TOKEN: ${{ secrets.SHOPIFY_APP_AUTOMATION_TOKEN }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: shopify app deploy --config production --allow-updates --source-control-url "$COMMIT_URL"
